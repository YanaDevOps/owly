replicaCount: 1

image:
  repository: ghcr.io/yanadevops/owly
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8443
  targetPort: 8443

ingress:
  enabled: false
  className: ""
  annotations:
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: owly.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

env:
  OWLY_HTTP: ":8443"
  OWLY_INSECURE: "true"
  OWLY_GROUPS: /opt/owly/groups
  OWLY_RECORDINGS: /opt/owly/recordings
  OWLY_DATA: /opt/owly/data
  OWLY_RELAY_ONLY: ""
  OWLY_TURN: ""

probes:
  liveness:
    enabled: true
    path: /api/health
    scheme: HTTP
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
    successThreshold: 1
  readiness:
    enabled: true
    path: /api/health
    scheme: HTTP
    initialDelaySeconds: 3
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
    successThreshold: 1

persistence:
  data:
    enabled: true
    size: 2Gi
    storageClass: ""
  recordings:
    enabled: true
    size: 10Gi
    storageClass: ""

sampleGroup:
  enabled: true
  name: public
  username: owner
  password: change-me
