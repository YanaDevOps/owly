apiVersion: v1
kind: Service
metadata:
  name: {{ include "owly.fullname" . }}
  labels:
    {{- include "owly.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "owly.selectorLabels" . | nindent 4 }}
  ports:
    - name: https
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
